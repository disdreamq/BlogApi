basePath: /
definitions:
  handler.AuthRequest:
    properties:
      email:
        example: user@example.com
        type: string
      password:
        example: password123
        type: string
    type: object
  handler.AuthResponse:
    properties:
      token:
        type: string
      token_payload: {}
    type: object
  handler.CreatePostRequest:
    properties:
      content:
        type: string
      title:
        type: string
    type: object
  handler.CreateUserRequest:
    properties:
      email:
        example: user@example.com
        type: string
      password:
        example: password123
        type: string
      username:
        example: johndoe
        type: string
    type: object
  handler.ErrorResponse:
    properties:
      error:
        type: string
    type: object
  handler.PostResponse:
    properties:
      content:
        type: string
      created_at: {}
      id:
        type: integer
      title:
        type: string
      user_id:
        type: integer
    type: object
  handler.UpdatePostRequest:
    properties:
      content:
        type: string
      id:
        type: integer
      title:
        type: string
    type: object
  handler.UpdateUserRequest:
    properties:
      email:
        type: string
      id:
        type: integer
      password:
        example: password123
        type: string
      username:
        type: string
    type: object
  handler.UserResponse:
    properties:
      created_at:
        type: string
      email:
        type: string
      id:
        type: integer
      username:
        type: string
    type: object
host: localhost:8080
info:
  contact: {}
  description: REST API для блога с авторизацией, управлением пользователями и постами
  title: Blog API
  version: "1.0"
paths:
  /login:
    post:
      consumes:
      - application/json
      description: Authenticates a user by email and password and returns a JWT token
      parameters:
      - description: Login credentials
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handler.AuthRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.AuthResponse'
        "400":
          description: invalid JSON
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "401":
          description: wrong password / can not login
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "404":
          description: user not found
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "500":
          description: internal server error
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
      summary: Login to the blog
      tags:
      - auth
  /posts/:
    post:
      consumes:
      - application/json
      description: Creates a new post for the authenticated user (requires authentication)
      parameters:
      - description: Post data
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handler.CreatePostRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/handler.PostResponse'
        "400":
          description: invalid JSON / invalid title or content
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "401":
          description: unauthorized
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "409":
          description: linked user with this id doesnt exists
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "500":
          description: failed to create post
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Create a new post
      tags:
      - posts
  /posts/{postID}:
    delete:
      consumes:
      - application/json
      description: Removes a post by ID (requires authentication)
      parameters:
      - description: Post ID
        in: path
        name: postID
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "204":
          description: No Content
          schema:
            type: string
        "400":
          description: invalid post ID / invalid user ID
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "401":
          description: unauthorized
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "404":
          description: post not found
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "500":
          description: failed to get post
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Delete a post
      tags:
      - posts
    put:
      consumes:
      - application/json
      description: Updates an existing post by ID (requires authentication)
      parameters:
      - description: Post ID
        in: path
        name: postID
        required: true
        type: integer
      - description: Post data to update
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handler.UpdatePostRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            type: string
        "400":
          description: invalid post ID / invalid JSON / invalid user ID
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "401":
          description: unauthorized
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "404":
          description: user not found
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "500":
          description: failed to get post
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Update a post
      tags:
      - posts
  /posts/id/{postID}:
    get:
      consumes:
      - application/json
      description: Returns a single post by its ID (requires authentication)
      parameters:
      - description: Post ID
        in: path
        name: postID
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.PostResponse'
        "400":
          description: invalid post ID
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "401":
          description: unauthorized
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "404":
          description: post not found
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "500":
          description: failed to get post
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
      summary: Get post by ID
      tags:
      - posts
  /posts/title/{title}:
    get:
      consumes:
      - application/json
      description: Returns a single post by its title (requires authentication)
      parameters:
      - description: Post Title
        in: path
        name: title
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.PostResponse'
        "400":
          description: invalid post title / failed to get post
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "401":
          description: unauthorized
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "404":
          description: post not found
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
      summary: Get post by title
      tags:
      - posts
  /register:
    post:
      consumes:
      - application/json
      description: Creates a new user account
      parameters:
      - description: User registration data
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handler.CreateUserRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/handler.UserResponse'
        "400":
          description: invalid JSON
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "404":
          description: user not found
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "409":
          description: user with this email already exists
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "500":
          description: failed to create user
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
      summary: Register a new user
      tags:
      - users
  /users/{userID}:
    delete:
      consumes:
      - application/json
      description: Removes a user by ID (requires authentication)
      parameters:
      - description: User ID
        in: path
        name: userID
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "204":
          description: No Content
          schema:
            type: string
        "400":
          description: invalid user ID
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "401":
          description: unauthorized
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "404":
          description: user not found
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "500":
          description: failed to get user
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Delete a user
      tags:
      - users
    put:
      consumes:
      - application/json
      description: Updates an existing user by ID (requires authentication)
      parameters:
      - description: User ID
        in: path
        name: userID
        required: true
        type: integer
      - description: User data to update
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handler.UpdateUserRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            type: string
        "400":
          description: invalid user ID / invalid JSON
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "401":
          description: unauthorized
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "404":
          description: user not found
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "500":
          description: failed to get user
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Update a user
      tags:
      - users
  /users/email/{email}:
    get:
      consumes:
      - application/json
      description: Returns a single user by their email (requires authentication)
      parameters:
      - description: User Email
        in: path
        name: email
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.UserResponse'
        "400":
          description: failed to get user
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "401":
          description: unauthorized
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "404":
          description: user not found
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get user by email
      tags:
      - users
  /users/id/{userID}:
    get:
      consumes:
      - application/json
      description: Returns a single user by their ID (requires authentication)
      parameters:
      - description: User ID
        in: path
        name: userID
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.UserResponse'
        "400":
          description: invalid user ID
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "401":
          description: unauthorized
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "404":
          description: user not found
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "500":
          description: failed to get user
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get user by ID
      tags:
      - users
schemes:
- http
securityDefinitions:
  BearerAuth:
    description: 'Введите токен в формате: Bearer <ваш_токен>'
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
